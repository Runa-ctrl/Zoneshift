<style>

    --mono: 'Space Mono', monospace; --sans: 'Syne', sans-serif;
  }
  body { background: var(--bg); color: var(--text); font-family: var(--sans); min-height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 3rem 1rem 5rem; }
  .glow { position: fixed; top: -200px; left: 50%; transform: translateX(-50%); width: 700px; height: 500px; background: radial-gradient(ellipse, rgba(79,255,176,0.05) 0%, transparent 70%); pointer-events: none; }
  .container { width: 100%; max-width: 620px; position: relative; z-index: 1; }
  header { text-align: center; margin-bottom: 3rem; }
  .tag { display: inline-block; font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: .18em; border: 1px solid rgba(79,255,176,0.25); padding: 4px 14px; border-radius: 2px; margin-bottom: 1.25rem; }
  h1 { font-size: clamp(2.2rem, 7vw, 3.8rem); font-weight: 800; line-height: 1; letter-spacing: -.025em; margin-bottom: .6rem; }
  h1 em { color: var(--accent); font-style: normal; }
  .sub { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: .06em; }
  .card { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 2rem; margin-bottom: 1.25rem; }
  .card-label { font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: .15em; margin-bottom: 1.5rem; }
  .input-grid { display: grid; grid-template-columns: 1fr 90px; gap: 12px; margin-bottom: 12px; }
  .time-grid { display: grid; grid-template-columns: 1fr 1fr 90px; gap: 12px; margin-bottom: 1.5rem; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .1em; }
  input[type="text"], input[type="number"], select { background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: var(--mono); font-size: 15px; padding: 11px 14px; outline: none; width: 100%; transition: border-color .15s; }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  select option { background: #1e1e2c; }
  .go { width: 100%; background: var(--accent); color: #0d0d14; border: none; border-radius: 8px; font-family: var(--mono); font-size: 14px; font-weight: 700; padding: 13px; cursor: pointer; letter-spacing: .06em; transition: opacity .15s, transform .1s; }
  .go:hover { opacity: .85; } .go:active { transform: scale(.98); }
  .err { font-family: var(--mono); font-size: 12px; color: var(--red); background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.2); border-radius: 8px; padding: 10px 14px; margin-bottom: 1rem; display: none; }
  .result { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; overflow: hidden; display: none; margin-bottom: 1.25rem; }
  .result.show { display: block; }
  .res-header { background: var(--accent-dim); border-bottom: 1px solid rgba(79,255,176,0.15); padding: 1rem 2rem; font-family: var(--mono); font-size: 12px; color: var(--accent); letter-spacing: .1em; }
  .res-body { padding: 0 2rem; }
  .res-row { display: flex; align-items: center; justify-content: space-between; padding: 1.1rem 0; border-bottom: 1px solid var(--border); gap: 12px; }
  .res-row:last-child { border-bottom: none; }
  .res-key { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .08em; white-space: nowrap; }
  .res-val { font-family: var(--mono); font-size: 22px; font-weight: 700; text-align: right; }
  .c-green { color: var(--accent); } .c-blue { color: var(--blue); } .c-red { color: var(--red); }
  .info-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 1.5rem 2rem; display: none; }
  .info-box.show { display: block; }
  .info-title { font-family: var(--mono); font-size: 10px; color: var(--yellow); letter-spacing: .15em; margin-bottom: 1rem; }
  .info-note { font-family: var(--mono); font-size: 12px; color: var(--muted); line-height: 1.8; }
  .info-note span { color: var(--text); }
  footer { margin-top: 3rem; font-family: var(--mono); font-size: 10px; color: var(--muted); text-align: center; letter-spacing: .08em; }
  @media (max-width: 480px) { .input-grid { grid-template-columns: 1fr; } .time-grid { grid-template-columns: 1fr 1fr; } .time-grid .field:last-child { grid-column: span 2; } }
</style>
</head>
<body>
<div class="glow"></div>
<div class="container">
  <header>
    <div class="tag">US TIMEZONE CONVERTER</div>
    <h1>City <em>&rarr;</em> ET</h1>
    <p class="sub">enter city &middot; get eastern + military time</p>
  </header>

  <div class="card">
    <div class="card-label">// ENTER DATA</div>
    <div class="input-grid">
      <div class="field"><label>CITY</label><input id="cityInput" type="text" placeholder="Los Angeles" autocomplete="off" /></div>
      <div class="field"><label>STATE</label><input id="stateInput" type="text" placeholder="CA" maxlength="2" autocomplete="off" /></div>
    </div>
    <div class="time-grid">
      <div class="field"><label>HOUR (1-12)</label><input id="hourInput" type="number" min="1" max="12" placeholder="9" /></div>
      <div class="field"><label>MINUTES</label><input id="minInput" type="number" min="0" max="59" placeholder="30" /></div>
      <div class="field"><label>AM / PM</label><select id="ampmSel"><option value="AM">AM</option><option value="PM">PM</option></select></div>
    </div>
    <button class="go" onclick="lookup()">CHECK &rarr;</button>
  </div>

  <div class="err" id="errBox"></div>

  <div class="result" id="resultCard">
    <div class="res-header" id="resHeader"></div>
    <div class="res-body">
      <div class="res-row"><span class="res-key">LOCAL TIME</span><span class="res-val c-green" id="rLocal"></span></div>
      <div class="res-row"><span class="res-key">EASTERN TIME (ET)</span><span class="res-val c-blue" id="rET"></span></div>
      <div class="res-row"><span class="res-key">MILITARY TIME (ET)</span><span class="res-val c-red" id="rMil"></span></div>
    </div>
  </div>

  <div class="info-box" id="infoBox">
    <div class="info-title">// TIMEZONE INFO</div>
    <div class="info-note" id="infoNote"></div>
  </div>

  <footer>offline &middot; no api &middot; github pages ready</footer>
</div>

  "evansville|in":"America/Chicago","fort wayne|in":"America/Indiana/Indianapolis",
  "south bend|in":"America/Indiana/Indianapolis","hammond|in":"America/Chicago",

};

const TZ_LABELS = {
  "America/New_York": "Eastern (ET)",
  "America/Chicago": "Central (CT)",
  "America/Denver": "Mountain (MT)",
  "America/Los_Angeles": "Pacific (PT)",
  "America/Phoenix": "Mountain no DST (AZ)",
  "America/Anchorage": "Alaska (AKT)",
  "Pacific/Honolulu": "Hawaii (HAT)",
  "America/Indiana/Indianapolis": "Eastern Indiana (ET)",
  "America/Detroit": "Eastern Michigan (ET)"
};

// Returns current UTC offset in hours for a given IANA timezone
function getOffset(tzId) {
  const now = new Date();
  const s = now.toLocaleString('en-US', { timeZone: tzId, timeZoneName: 'shortOffset' });
  const m = s.match(/GMT([+-]\d+(?::\d+)?)/);
  if (!m) return 0;
  const parts = m[1].split(':');
  return parseInt(parts[0]) + (parts[1] ? (parseInt(parts[0]) >= 0 ? 1 : -1) * parseInt(parts[1]) / 60 : 0);
}

function formatAMPM(h24, m) {
  const ampm = h24 >= 12 ? 'PM' : 'AM';
  let h = h24 % 12;
  if (h === 0) h = 12;
  return h + ':' + String(m).padStart(2, '0') + ' ' + ampm;
}

function showErr(msg) {
  document.getElementById('errBox').textContent = msg;
  document.getElementById('errBox').style.display = 'block';
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('infoBox').classList.remove('show');
}

function lookup() {
  document.getElementById('errBox').style.display = 'none';
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('infoBox').classList.remove('show');

  const city    = document.getElementById('cityInput').value.trim().toLowerCase();
  const state   = document.getElementById('stateInput').value.trim().toLowerCase();
  const hourRaw = parseInt(document.getElementById('hourInput').value);
  const minRaw  = parseInt(document.getElementById('minInput').value) || 0;
  const ampm    = document.getElementById('ampmSel').value;

  if (!city)  return showErr('Please enter a city name.');
  if (!state || state.length !== 2) return showErr('Please enter a 2-letter state code (CA, NY, TX...).');
  if (isNaN(hourRaw) || hourRaw < 1 || hourRaw > 12) return showErr('Hour must be between 1 and 12.');
  if (minRaw < 0 || minRaw > 59) return showErr('Minutes must be between 0 and 59.');

  const key = city + '|' + state;
  const tzId = CITY_DB[key];

  if (!tzId) {
    return showErr('City not found in database. Try a nearby larger city, or check the spelling.');
  }

  let hour24 = hourRaw % 12;
  if (ampm === 'PM') hour24 += 12;

  // Get live offsets from browser (handles DST automatically)
  const cityOffset = getOffset(tzId);
  const etOffset   = getOffset('America/New_York');

  // city local -> UTC -> ET
  const totalMins = hour24 * 60 + minRaw;
  const utcMins   = totalMins - cityOffset * 60;
  const etMins    = utcMins + etOffset * 60;
  const etNorm    = ((etMins % 1440) + 1440) % 1440;
  const etH24     = Math.floor(etNorm / 60);
  const etM       = etNorm % 60;

  const localDisplay = formatAMPM(hour24, minRaw);
  const etDisplay    = formatAMPM(etH24, etM);
  const milDisplay   = String(etH24).padStart(2, '0') + String(etM).padStart(2, '0');
  const diffHours    = Math.round(cityOffset - etOffset);

  const displayCity  = city.replace(/\b\w/g, c => c.toUpperCase());
  const displayState = state.toUpperCase();

  document.getElementById('resHeader').textContent =
    displayCity + ', ' + displayState + '  —  ' + hourRaw + ':' + String(minRaw).padStart(2, '0') + ' ' + ampm;

  document.getElementById('rLocal').textContent = localDisplay;
  document.getElementById('rET').textContent    = etDisplay;
  document.getElementById('rMil').textContent   = milDisplay;
  document.getElementById('resultCard').classList.add('show');

  // Info note
  const tzLabel = TZ_LABELS[tzId] || tzId;
  let note = '<span>' + displayCity + ', ' + displayState + '</span> is in the <span>' + tzLabel + '</span> zone. ';
  if (diffHours === 0) {
    note += 'Already on <span>Eastern Time</span> — no conversion needed.';
  } else if (diffHours < 0) {
    note += '<span>' + Math.abs(diffHours) + 'h behind ET</span>. To get ET, add ' + Math.abs(diffHours) + 'h.';
  } else {
    note += '<span>' + diffHours + 'h ahead of ET</span>. To get ET, subtract ' + diffHours + 'h.';
  }

  document.getElementById('infoNote').innerHTML = note;
  document.getElementById('infoBox').classList.add('show');
}

document.addEventListener('keydown', function(e) { if (e.key === 'Enter') lookup(); });
</script>
