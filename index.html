<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>US City Time Converter</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0d14;
    --surface: #14141e;
    --surface2: #1e1e2c;
    --border: rgba(255,255,255,0.07);
    --border2: rgba(255,255,255,0.14);
    --accent: #4fffb0;
    --accent-dim: rgba(79,255,176,0.12);
    --red: #ff6b6b;
    --blue: #6eb5ff;
    --yellow: #ffd166;
    --text: #eeeef5;
    --muted: #666678;
    --mono: 'Space Mono', monospace;
    --sans: 'Syne', sans-serif;
  }
  body {
    background: var(--bg); color: var(--text); font-family: var(--sans);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 3rem 1rem 5rem;
  }
  .glow {
    position: fixed; top: -200px; left: 50%; transform: translateX(-50%);
    width: 700px; height: 500px;
    background: radial-gradient(ellipse, rgba(79,255,176,0.05) 0%, transparent 70%);
    pointer-events: none;
  }
  .container { width: 100%; max-width: 620px; position: relative; z-index: 1; }
  header { text-align: center; margin-bottom: 3rem; }
  .tag {
    display: inline-block; font-family: var(--mono); font-size: 10px;
    color: var(--accent); letter-spacing: .18em;
    border: 1px solid rgba(79,255,176,0.25);
    padding: 4px 14px; border-radius: 2px; margin-bottom: 1.25rem;
  }
  h1 { font-size: clamp(2.2rem, 7vw, 3.8rem); font-weight: 800; line-height: 1; letter-spacing: -.025em; margin-bottom: .6rem; }
  h1 em { color: var(--accent); font-style: normal; }
  .sub { font-family: var(--mono); font-size: 12px; color: var(--muted); letter-spacing: .06em; }
  .card { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 2rem; margin-bottom: 1.25rem; }
  .card-label { font-family: var(--mono); font-size: 10px; color: var(--accent); letter-spacing: .15em; margin-bottom: 1.5rem; }
  .input-grid { display: grid; grid-template-columns: 1fr 90px; gap: 12px; margin-bottom: 12px; }
  .time-grid { display: grid; grid-template-columns: 1fr 1fr 90px; gap: 12px; margin-bottom: 1.5rem; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-family: var(--mono); font-size: 10px; color: var(--muted); letter-spacing: .1em; }
  input[type="text"], input[type="number"], select {
    background: var(--surface2); border: 1px solid var(--border2); border-radius: 8px;
    color: var(--text); font-family: var(--mono); font-size: 15px;
    padding: 11px 14px; outline: none; width: 100%; transition: border-color .15s;
  }
  input:focus, select:focus { border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  select option { background: #1e1e2c; }
  .go {
    width: 100%; background: var(--accent); color: #0d0d14; border: none; border-radius: 8px;
    font-family: var(--mono); font-size: 14px; font-weight: 700; padding: 13px;
    cursor: pointer; letter-spacing: .06em; transition: opacity .15s, transform .1s;
  }
  .go:hover { opacity: .85; }
  .go:active { transform: scale(.98); }
  .go:disabled { opacity: .4; cursor: not-allowed; }
  .err {
    font-family: var(--mono); font-size: 12px; color: var(--red);
    background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.2);
    border-radius: 8px; padding: 10px 14px; margin-bottom: 1rem; display: none;
  }
  .loading {
    font-family: var(--mono); font-size: 12px; color: var(--yellow);
    background: rgba(255,209,102,0.08); border: 1px solid rgba(255,209,102,0.2);
    border-radius: 8px; padding: 10px 14px; margin-bottom: 1rem; display: none;
    letter-spacing: .06em;
  }
  .result { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; overflow: hidden; display: none; margin-bottom: 1.25rem; }
  .result.show { display: block; }
  .res-header {
    background: var(--accent-dim); border-bottom: 1px solid rgba(79,255,176,0.15);
    padding: 1rem 2rem; font-family: var(--mono); font-size: 12px; color: var(--accent); letter-spacing: .1em;
  }
  .res-body { padding: 0 2rem; }
  .res-row {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1.1rem 0; border-bottom: 1px solid var(--border); gap: 12px;
  }
  .res-row:last-child { border-bottom: none; }
  .res-key { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .08em; white-space: nowrap; }
  .res-val { font-family: var(--mono); font-size: 22px; font-weight: 700; text-align: right; }
  .c-green { color: var(--accent); }
  .c-blue  { color: var(--blue); }
  .c-red   { color: var(--red); }
  .info-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 14px; padding: 1.5rem 2rem; display: none; }
  .info-box.show { display: block; }
  .info-title { font-family: var(--mono); font-size: 10px; color: var(--yellow); letter-spacing: .15em; margin-bottom: 1rem; }
  .info-note { font-family: var(--mono); font-size: 12px; color: var(--muted); line-height: 1.8; }
  .info-note span { color: var(--text); }
  footer { margin-top: 3rem; font-family: var(--mono); font-size: 10px; color: var(--muted); text-align: center; letter-spacing: .08em; }
  @media (max-width: 480px) {
    .input-grid { grid-template-columns: 1fr; }
    .time-grid  { grid-template-columns: 1fr 1fr; }
    .time-grid .field:last-child { grid-column: span 2; }
  }
</style>
</head>
<body>
<div class="glow"></div>
<div class="container">

  <header>
    <div class="tag">US TIMEZONE CONVERTER</div>
    <h1>City <em>&rarr;</em> ET</h1>
    <p class="sub">enter city &middot; get eastern + military time</p>
  </header>

  <div class="card">
    <div class="card-label">// ENTER DATA</div>
    <div class="input-grid">
      <div class="field">
        <label>CITY</label>
        <input id="cityInput" type="text" placeholder="Los Angeles" autocomplete="off" />
      </div>
      <div class="field">
        <label>STATE</label>
        <input id="stateInput" type="text" placeholder="CA" maxlength="2" autocomplete="off" />
      </div>
    </div>
    <div class="time-grid">
      <div class="field">
        <label>HOUR (1-12)</label>
        <input id="hourInput" type="number" min="1" max="12" placeholder="9" />
      </div>
      <div class="field">
        <label>MINUTES</label>
        <input id="minInput" type="number" min="0" max="59" placeholder="30" />
      </div>
      <div class="field">
        <label>AM / PM</label>
        <select id="ampmSel">
          <option value="AM">AM</option>
          <option value="PM">PM</option>
        </select>
      </div>
    </div>
    <button class="go" id="goBtn" onclick="lookup()">CHECK &rarr;</button>
  </div>

  <div class="err" id="errBox"></div>
  <div class="loading" id="loadingBox">Looking up timezone for that city...</div>

  <div class="result" id="resultCard">
    <div class="res-header" id="resHeader"></div>
    <div class="res-body">
      <div class="res-row">
        <span class="res-key">CITY TIMEZONE</span>
        <span class="res-val c-green" id="rZone"></span>
      </div>
      <div class="res-row">
        <span class="res-key">LOCAL TIME</span>
        <span class="res-val c-green" id="rLocal"></span>
      </div>
      <div class="res-row">
        <span class="res-key">EASTERN TIME (ET)</span>
        <span class="res-val c-blue" id="rET"></span>
      </div>
      <div class="res-row">
        <span class="res-key">MILITARY TIME (ET)</span>
        <span class="res-val c-red" id="rMil"></span>
      </div>
    </div>
  </div>

  <div class="info-box" id="infoBox">
    <div class="info-title">// TIMEZONE INFO</div>
    <div class="info-note" id="infoNote"></div>
  </div>

  <footer>powered by geonames.org api &middot; github pages ready</footer>
</div>

<script>
const GEONAMES_USER = 'verydiffusername';

function showErr(msg) {
  const e = document.getElementById('errBox');
  e.textContent = msg;
  e.style.display = 'block';
  document.getElementById('loadingBox').style.display = 'none';
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('infoBox').classList.remove('show');
  document.getElementById('goBtn').disabled = false;
}

function setLoading(on) {
  document.getElementById('loadingBox').style.display = on ? 'block' : 'none';
  document.getElementById('goBtn').disabled = on;
  if (on) document.getElementById('errBox').style.display = 'none';
}

function fmtAMPM(d, tz) {
  return d.toLocaleTimeString('en-US', { timeZone: tz, hour: 'numeric', minute: '2-digit', hour12: true });
}

function fmtMil(d, tz) {
  const s = d.toLocaleTimeString('en-US', { timeZone: tz, hour: '2-digit', minute: '2-digit', hour12: false });
  return s.replace(':', '');
}

async function lookup() {
  document.getElementById('errBox').style.display = 'none';
  document.getElementById('resultCard').classList.remove('show');
  document.getElementById('infoBox').classList.remove('show');

  const city    = document.getElementById('cityInput').value.trim();
  const state   = document.getElementById('stateInput').value.trim().toUpperCase();
  const hourRaw = parseInt(document.getElementById('hourInput').value);
  const minRaw  = parseInt(document.getElementById('minInput').value) || 0;
  const ampm    = document.getElementById('ampmSel').value;

  if (!city)    return showErr('Please enter a city name.');
  if (!state || state.length !== 2) return showErr('Please enter a 2-letter state code (CA, NY, TX...).');
  if (isNaN(hourRaw) || hourRaw < 1 || hourRaw > 12) return showErr('Hour must be between 1 and 12.');
  if (minRaw < 0 || minRaw > 59) return showErr('Minutes must be between 0 and 59.');

  setLoading(true);

  try {
    const searchUrl = `https://secure.geonames.org/searchJSON?q=${encodeURIComponent(city)}&adminCode1=${state}&country=US&maxRows=1&username=${GEONAMES_USER}&featureClass=P`;
    const searchRes = await fetch(searchUrl);
    const searchData = await searchRes.json();

    if (!searchData.geonames || searchData.geonames.length === 0) {
      return showErr('City not found. Check the spelling or state code.');
    }

    const place = searchData.geonames[0];
    const lat = place.lat;
    const lng = place.lng;
    const foundCity = place.name;
    const foundState = place.adminCode1;

    const tzUrl = `https://secure.geonames.org/timezoneJSON?lat=${lat}&lng=${lng}&username=${GEONAMES_USER}`;
    const tzRes = await fetch(tzUrl);
    const tzData = await tzRes.json();

    if (!tzData.timezoneId) {
      return showErr('Could not retrieve timezone for this location.');
    }

    const timezoneId = tzData.timezoneId;
    const gmtOffset  = tzData.gmtOffset;
    const dstOffset  = tzData.dstOffset;

    let hour24 = hourRaw % 12;
    if (ampm === 'PM') hour24 += 12;

    const now     = new Date();
    const dateStr = now.toLocaleDateString('en-CA', { timeZone: timezoneId });
    const ref     = new Date(dateStr + 'T' + String(hour24).padStart(2,'0') + ':' + String(minRaw).padStart(2,'0') + ':00');

    const localAMPM = fmtAMPM(ref, timezoneId);
    const etAMPM    = fmtAMPM(ref, 'America/New_York');
    const milET     = fmtMil(ref, 'America/New_York');

    const etOffset  = tzData.rawOffset !== undefined ? tzData.rawOffset : gmtOffset;
    const nyOffset  = -5;
    const diffHours = Math.round(gmtOffset - (-5));

    document.getElementById('resHeader').textContent =
      foundCity.toUpperCase() + ', ' + foundState + '  —  ' +
      hourRaw + ':' + String(minRaw).padStart(2,'0') + ' ' + ampm;

    document.getElementById('rZone').textContent  = timezoneId.replace('America/', '').replace('_', ' ');
    document.getElementById('rLocal').textContent = localAMPM;
    document.getElementById('rET').textContent    = etAMPM;
    document.getElementById('rMil').textContent   = milET;
    document.getElementById('resultCard').classList.add('show');

    let noteHtml = '<span>' + foundCity + ', ' + foundState + '</span> is in the <span>' + timezoneId + '</span> zone. ';
    if (diffHours === 0) {
      noteHtml += 'It is already on <span>Eastern Time</span> — no conversion needed.';
    } else if (diffHours < 0) {
      noteHtml += 'It is <span>' + Math.abs(diffHours) + ' hour' + (Math.abs(diffHours) > 1 ? 's' : '') + ' behind Eastern Time</span>. To convert to ET, add ' + Math.abs(diffHours) + 'h.';
    } else {
      noteHtml += 'It is <span>' + diffHours + ' hour' + (diffHours > 1 ? 's' : '') + ' ahead of Eastern Time</span>. To convert to ET, subtract ' + diffHours + 'h.';
    }

    const isDST = gmtOffset !== (tzData.rawOffset !== undefined ? tzData.rawOffset : gmtOffset);
    noteHtml += ' Current offset from UTC: <span>UTC' + (gmtOffset >= 0 ? '+' : '') + gmtOffset + '</span>.';
    if (dstOffset !== gmtOffset) {
      noteHtml += ' Daylight saving is <span>active</span> in this zone.';
    }

    document.getElementById('infoNote').innerHTML = noteHtml;
    document.getElementById('infoBox').classList.add('show');

  } catch (err) {
    showErr('Network error. Check your internet connection and try again.');
  }

  setLoading(false);
}

document.addEventListener('keydown', function(e) { if (e.key === 'Enter') lookup(); });
</script>
</body>
</html>
